name: "AgentScan"
description: "Detects automation patterns on GitHub"
author: "Matteo Gabriele"
inputs:
  github-token:
    description: "GitHub token"
    required: true
  skip-members:
    description: "yaml list of usernames to skip from scanning"
    required: false
    default: ""
  report:
    description: |
      What to report. Can be:
      - Boolean: "true" (all results) or "false" (never report)
      - JSON Array: '["automation", "community-flag"]' (specific classifications only)
      Valid classifications: organic, mixed, automation, community-flag
    required: false
    default: "true"
  cache-path:
    description: "Path to cache directory (e.g., '.agentscan-cache') - if provided, analysis results will be cached"
    required: false
    default: ""
outputs:
  flagged:
    description: "Whether the account was flagged"
  classification:
    description: "Classification result: organic, mixed, or automation"
  score:
    description: "Numeric score from 0 to 100"
  community-flagged:
    description: "Whether the account is on the community verified automations list"
  flags:
    description: "JSON array of flag objects with label, points, and detail"
  account-age:
    description: "Account age in days"
  username:
    description: "The GitHub username that was analyzed"
branding:
  icon: "activity"
  color: "white"
runs:
  using: "node24"
  main: "dist/index.mjs"
