name: "AgentScan"
description: "Detects automation patterns on GitHub"
author: "Matteo Gabriele"
inputs:
  github-token:
    description: "GitHub token"
    required: true
  skip-members:
    description: "Comma-separated list of usernames to skip from scanning"
    required: false
    default: ""
  agent-scan-comment:
    description: "Whether to enable AgentScan commenting on the issue or PR. True by default. You can disable this if you only want to use the outputs and not have the action comment on the issue or PR."
    required: false
    default: "true"
  skip-comment-on-organic:
    description: "Skip posting comment on PR if analysis result is 'organic'"
    required: false
    default: "false"
  cache-path:
    description: "Path to cache directory (e.g., '.agentscan-cache') - if provided, analysis results will be cached"
    required: false
    default: ""
  ai-analysis:
    description: "Enable AI-powered analysis using GitHub Models to assess if the user is automated. Requires 'models: read' permission in your workflow."
    required: false
    default: "false"
  ai-model:
    description: "The GitHub Models model to use for AI analysis (e.g., 'openai/gpt-4o-mini', 'mistral-ai/ministral-3b')"
    required: false
    default: "openai/gpt-4o-mini"
outputs:
  flagged:
    description: "Whether the account was flagged"
  classification:
    description: "Classification result: organic, mixed, or automation"
  score:
    description: "Numeric score from 0 to 100"
  community-flagged:
    description: "Whether the account is on the community verified automations list"
  flags:
    description: "JSON array of flag objects with label, points, and detail"
  account-age:
    description: "Account age in days"
  username:
    description: "The GitHub username that was analyzed"
  ai-assessment:
    description: "JSON object with AI classification, confidence (0-100), and reasoning (only when ai-analysis is enabled)"
branding:
  icon: "activity"
  color: "white"
runs:
  using: "node24"
  main: "dist/index.mjs"
